image: Visual Studio 2019

environment:
  PYTHON_HOME: C:\Python38

install:
  - set PATH=%PYTHON_HOME%;%PYTHON_HOME%\Scripts;%PATH%
  - python -m pip install --upgrade pip
  - pip install -r requirements.txt

test_script:
  - cd flaskapp
  - python -c "from some_app import app; print('Import OK')"
  - python -c "from some_app import app; print(app.url_map)"  # показать все маршруты

build: off